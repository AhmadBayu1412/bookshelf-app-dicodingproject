<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookshelf App</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

  <script defer src="main.js"></script>
</head>

<body>
  <header>
    <div class="logo"><i class="ti ti-vocabulary"></i></div>
    <h1>Bookshelf App</h1>
  </header>

  <main>

    <div class="input-container">
      <section class="input-user">
        <div class="input-title">
          <span><i class="ti ti-plus"></i></span>
          <h2>Tambah Buku Baru</h2>
        </div>
        <form id="bookForm" data-testid="bookForm">
          <div class="input-book">
            <label for="bookFormTitle">Judul</label>
            <input id="bookFormTitle" type="text" required data-testid="bookFormTitleInput"
              placeholder="Masukkan judul buku" />
          </div>
          <div class="input-book">
            <label for="bookFormAuthor">Penulis</label>
            <input id="bookFormAuthor" type="text" required data-testid="bookFormAuthorInput"
              placeholder="Masukkan nama penulis" />
          </div>
          <div class="input-book">
            <label for="bookFormYear">Tahun</label>
            <input id="bookFormYear" type="number" required data-testid="bookFormYearInput"
              placeholder="Masukkan tahun terbit" />
          </div>

          <!-- INPUT GAMBAR DARI LOKAL USER -->
          <div class="input-book">
            <label>Sampul Buku <span class="optional-label">(opsional)</span></label>
            <div class="image-upload-wrapper">
              <div class="image-preview" id="imagePreview">
                <div class="image-placeholder">
                  <i class="ti ti-photo"></i>
                  <span>Belum ada gambar dipilih</span>
                </div>
              </div>
              <input id="bookFormImage" type="file" accept="image/*" data-testid="bookFormImageInput" />
              <label for="bookFormImage" class="image-upload-btn">
                <i class="ti ti-upload"></i> Pilih Gambar dari Perangkat
              </label>
            </div>
          </div>

          <div class="input-book">
            <h4>Selesai dibaca</h4>
            <div class="checkbox">
              <input id="bookFormIsComplete" type="checkbox" data-testid="bookFormIsCompleteCheckbox" />
              <label for="bookFormIsComplete">Buku ini sudah selesai dibaca</label>
            </div>
          </div>
          <button id="bookFormSubmit" type="submit" data-testid="bookFormSubmitButton">
            Masukkan Buku ke rak
          </button>
        </form>
      </section>

      <section class="input-user">
        <div class="input-search">
          <span><i class="ti ti-search"></i></span>
          <h2>Cari Buku</h2>
        </div>
        <form id="searchBook" data-testid="searchBookForm">
          <label for="searchBookTitle">Judul</label>
          <input id="searchBookTitle" type="text" data-testid="searchBookFormTitleInput"
            placeholder="Masukkan judul buku yang dicari" />
          <button id="searchSubmit" type="submit" data-testid="searchBookFormSubmitButton">
            Cari
          </button>
        </form>
      </section>
    </div>

    <div class="book-show">

      <!-- BELUM SELESAI DIBACA -->
      <section class="book-preview">
        <div class="book-title unread">
          <span class="icon-header"><i class="ti ti-clock-hour-4"></i></span>
          <h2>Belum selesai dibaca</h2>
        </div>
        <div class="container-list incomplete" id="incompleteBookList" data-testid="incompleteBookList"></div>
      </section>

      <!-- SELESAI DIBACA -->
      <section class="book-preview">
        <div class="book-title read">
          <span class="icon-header"><i class="ti ti-check"></i></span>
          <h2>Selesai dibaca</h2>
        </div>
        <div class="container-list complete" id="completeBookList" data-testid="completeBookList"></div>
      </section>

    </div>
  </main>

  <footer>
    <p>© 2024 Bookshelf App. All rights reserved.</p>
  </footer>
</body>

</html>
